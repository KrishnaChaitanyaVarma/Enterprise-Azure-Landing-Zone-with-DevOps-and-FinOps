trigger:
  branches:
    include:
    - main
pool:
  name: Default
stages:
- stage: Dev
  displayName: 'Deploy Application Workload - Dev'
  jobs:
  - deployment: DeployAppDev
    displayName: 'Deploy App Resources'
    environment:
      name: 'App-Dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: 6d15af64-176c-496d-b583-fd2ae21d4df4@1
            inputs:
              repository: self
          - task: CmdLine@2
            displayName: 'Check Terraform Installation'
            inputs:
              script: terraform -version
          - task: CmdLine@2
            displayName: 'Verify Working Directory'
            inputs:
              script: |
                echo Current Directory:
                cd

                echo.
                echo Repository Root:
                dir "$(System.DefaultWorkingDirectory)"

                echo.
                echo Environments Folder:
                dir "$(System.DefaultWorkingDirectory)\environments"

                echo.
                echo Dev Folder:
                dir "$(System.DefaultWorkingDirectory)\environments\dev"
          - task: AzureCLI@2
            displayName: 'Terraform Init, Plan, Apply'
            inputs:
              azureSubscription: 'azure-sp-terraform'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)\environments\dev'
              inlineScript: |-
                $env:ARM_CLIENT_ID = $env:servicePrincipalId
                $env:ARM_CLIENT_SECRET = $env:servicePrincipalKey
                $env:ARM_SUBSCRIPTION_ID = $env:subscriptionId
                $env:ARM_TENANT_ID = $env:tenantId

                terraform init

                terraform plan `
                  -out=tfplan `
                  -lock-timeout=60s

                terraform apply `
                  -lock-timeout=60s `
                  -auto-approve `
                  tfplan

