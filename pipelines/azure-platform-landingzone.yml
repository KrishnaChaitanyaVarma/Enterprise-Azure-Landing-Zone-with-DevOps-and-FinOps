trigger:
  branches:
    include:
    - none
pool:
  name: Default
stages:
- stage: Dev
  displayName: 'Deploy to Dev'
  jobs:
  - deployment: DevDeploy
    displayName: 'Terraform Dev Deployment'
    environment:
      name: dev
    workspace:
      clean: all
    strategy:
      runOnce:
        deploy:
          steps:
          - task: 6d15af64-176c-496d-b583-fd2ae21d4df4@1
            inputs:
              repository: self
              clean: true
          - task: CmdLine@2
            displayName: 'Check Terraform Installation'
            inputs:
              script: terraform -version
          - task: CmdLine@2
            displayName: 'Verify Dev Working Directory'
            inputs:
              script: |
                echo "Current Directory:"
                cd
                echo "Listing Dev Files:"
                dir $(System.DefaultWorkingDirectory)\environments\dev
          - task: PowerShell@2
            displayName: 'Clean Terraform Workspace'
            inputs:
              targetType: inline
              script: |
                Write-Host "Cleaning old Terraform artifacts..."

                if (Test-Path ".terraform") {
                    Remove-Item -Recurse -Force .terraform
                }

                if (Test-Path "tfplan") {
                    Remove-Item -Force tfplan
                }

                if (Test-Path ".terraform.lock.hcl") {
                    Remove-Item -Force .terraform.lock.hcl
                }
              workingDirectory: '$(System.DefaultWorkingDirectory)/environments/dev'
          - task: AzureCLI@2
            displayName: 'Terraform Init, Plan, Apply (Dev)'
            inputs:
              azureSubscription: 'azure-sp-terraform'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)/environments/dev'
              inlineScript: |2

                Write-Host "===== MAIN.TF CONTENT ====="
                Get-Content main.tf

                # Azure authentication for Terraform
                $env:ARM_CLIENT_ID = $env:servicePrincipalId
                $env:ARM_CLIENT_SECRET = $env:servicePrincipalKey
                $env:ARM_SUBSCRIPTION_ID = $env:subscriptionId
                $env:ARM_TENANT_ID = $env:tenantId

                terraform init -reconfigure

                terraform plan -out=tfplan -lock-timeout=60s

                terraform apply -lock-timeout=60s -auto-approve tfplan
- stage: Prod
  displayName: 'Deploy to Prod'
  dependsOn:
  - Dev
  condition: succeeded()
  jobs:
  - deployment: ProdDeploy
    displayName: 'Terraform Prod Deployment'
    environment:
      name: prod
    workspace:
      clean: all
    strategy:
      runOnce:
        deploy:
          steps:
          - task: 6d15af64-176c-496d-b583-fd2ae21d4df4@1
            inputs:
              repository: self
              clean: true
          - task: CmdLine@2
            displayName: 'Check Terraform Installation'
            inputs:
              script: terraform -version
          - task: CmdLine@2
            displayName: 'Verify Prod Working Directory'
            inputs:
              script: |
                echo "Current Directory:"
                cd
                echo "Listing Prod Files:"
                dir $(System.DefaultWorkingDirectory)\environments\prod
          - task: PowerShell@2
            displayName: 'Clean Terraform Workspace'
            inputs:
              targetType: inline
              script: |
                Write-Host "Cleaning old Terraform artifacts..."

                if (Test-Path ".terraform") {
                    Remove-Item -Recurse -Force .terraform
                }

                if (Test-Path "tfplan") {
                    Remove-Item -Force tfplan
                }

                if (Test-Path ".terraform.lock.hcl") {
                    Remove-Item -Force .terraform.lock.hcl
                }
              workingDirectory: '$(System.DefaultWorkingDirectory)/environments/prod'
          - task: AzureCLI@2
            displayName: 'Terraform Init, Plan, Apply (Prod)'
            inputs:
              azureSubscription: 'azure-sp-terraform'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)/environments/prod'
              inlineScript: |2-

                Write-Host "===== MAIN.TF CONTENT ====="
                Get-Content main.tf

                # Azure authentication for Terraform
                $env:ARM_CLIENT_ID = $env:servicePrincipalId
                $env:ARM_CLIENT_SECRET = $env:servicePrincipalKey
                $env:ARM_SUBSCRIPTION_ID = $env:subscriptionId
                $env:ARM_TENANT_ID = $env:tenantId

                terraform init -reconfigure

                terraform plan -out=tfplan -lock-timeout=60s

                terraform apply -lock-timeout=60s -auto-approve tfplan

